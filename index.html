<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Poppy Playtime Chapter 3: Deep Sleep</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }

        /* --- OYUN ALANI (3D GÖRÜNÜMÜ VEREN KATMANLAR) --- */
        #game-container {
            width: 100vw; height: 100vh;
            perspective: 1000px;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* --- KIRMIZI GAZ SHADER (DEEP SLEEP) --- /
        #gas-overlay {
            position: fixed; inset: 0;
            background: rgba(150, 0, 0, 0.2);
            mix-blend-mode: multiply; pointer-events: none; z-index: 10;
            animation: gasPulse 8s infinite alternate ease-in-out;
        }

        @keyframes gasPulse {
            0% { opacity: 0.1; } 100% { opacity: 0.4; }
        }

        /* --- GERÇEKÇİ GRABPACK ELLERİ --- */
        .grabpack-container {
            position: fixed; bottom: 0; width: 100%; height: 40%;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 5%; box-sizing: border-box; pointer-events: none; z-index: 20;
        }

        .hand {
            width: 220px; height: 300px;
            background-size: contain; background-repeat: no-repeat;
            transition: transform 0.1s ease-out, bottom 0.2s;
            position: relative;
        }

        #blue-hand {
            background-image: url('https://i.ibb.co/L6v3YgG/blue-hand.png'); /* Temsili: Gerçekçi mavi el görseli gelmeli */
            background-color: #0044ff; border-radius: 50px 50px 0 0;
            box-shadow: 0 0 50px rgba(0, 68, 255, 0.5), inset -10px 0 30px #000;
        }

        #red-hand {
            background-image: url('https://i.ibb.co/Xz9tN7X/red-hand.png'); /* Temsili: Gerçekçi kırmızı el görseli gelmeli */
            background-color: #ff0000; border-radius: 50px 50px 0 0;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5), inset 10px 0 30px #000;
        }

        /* --- ANA MENÜ & AYARLAR --- */
        #ui-overlay {
            position: fixed; top: 20px; left: 20px; z-index: 30;
            color: white; text-shadow: 2px 2px 10px #000;
        }

        .stat-bar { width: 200px; height: 10px; background: #333; margin: 5px 0; border: 1px solid #555; }
        #stamina-fill { width: 100%; height: 100%; background: #7b2cbf; transition: 0.2s; }

        /* --- HAREKET EFEKTİ (DİNAMİK KORİDOR) --- */
        #corridor {
            width: 200%; height: 200%;
            background-image: repeating-linear-gradient(90deg, #111 0px, #111 50px, #222 50px, #222 100px);
            position: absolute; transform-style: preserve-3d;
            transition: transform 0.1s linear;
        }
    </style>
</head>
<body>

    <div id="gas-overlay"></div>

    <div id="ui-overlay">
        <h2 style="color: #7b2cbf; margin: 0;">CATNAP IS WATCHING</h2>
        <div class="stat-bar"><div id="stamina-fill"></div></div>
        <p id="coords">Konum: X: 0, Z: 0</p>
        <p id="objective">Görev: Gaz maskesini bul ve Playcare'e sız.</p>
    </div>

    <div id="game-container">
        <div id="corridor"></div>
    </div>

    <div class="grabpack-container">
        <div id="blue-hand" class="hand"></div>
        <div id="red-hand" class="hand"></div>
    </div>

    <script>
        const corridor = document.getElementById('corridor');
        const blueHand = document.getElementById('blue-hand');
        const redHand = document.getElementById('red-hand');
        
        let posX = 0, posZ = 0;
        let keys = {};

        // Klavye Kontrolleri (WASD)
        document.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        document.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        // Mouse ile El Hareket Ettirme & Bakış
        document.addEventListener('mousemove', (e) => {
            let moveX = (e.clientX - window.innerWidth / 2) / 20;
            let moveY = (e.clientY - window.innerHeight / 2) / 20;
            
            blueHand.style.transform = `translate(${moveX - 20}px, ${moveY + 10}px) rotate(${moveX/2}deg)`;
            redHand.style.transform = `translate(${moveX + 20}px, ${moveY + 10}px) rotate(${moveX/2}deg)`;
            corridor.style.transform = `rotateY(${-moveX/5}deg) rotateX(${moveY/5}deg)`;
        });

        // Tıklama ile El Ateşleme
        document.addEventListener('mousedown', (e) => {
            if(e.button === 0) { // Sol Tık (Mavi)
                blueHand.style.bottom = "150px";
                setTimeout(() => blueHand.style.bottom = "0", 200);
            } else if(e.button === 2) { // Sağ Tık (Kırmızı)
                redHand.style.bottom = "150px";
                setTimeout(() => redHand.style.bottom = "0", 200);
            }
        });
        window.oncontextmenu = () => false; // Sağ tık menüsünü engelle

        // Oyun Döngüsü (Hareket ve 3 Saatlik Akış Mantığı)
        function gameLoop() {
            let speed = 5;
            let moved = false;

            if (keys['w']) { posZ += speed; moved = true; }
            if (keys['s']) { posZ -= speed; moved = true; }
            if (keys['a']) { posX += speed; moved = true; }
            if (keys['d']) { posX -= speed; moved = true; }

            if (moved) {
                // Kamera sallantısı (Yürüme efekti)
                let bobbing = Math.sin(Date.now() / 150) * 5;
                corridor.style.backgroundPosition = `${posX}px ${posZ}px`;
                document.getElementById('game-container').style.transform = `translateY(${bobbing}px)`;
                document.getElementById('coords').innerText = `Konum: X: ${Math.floor(posX)}, Z: ${Math.floor(posZ)}`;
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();

        // 3 Saatlik Senaryo Tetikleyici (Özet)
        setTimeout(() => {
            document.getElementById('objective').innerText = "GÖREV: Miss Delight'tan kaç!";
            document.body.style.backgroundColor = "#1a0000";
        }, 10000); // Temsili: 10 saniye sonra bölüm değişir
    </script>
</body>
</html>
