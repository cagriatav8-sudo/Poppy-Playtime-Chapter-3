<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>POPPY PLAYTIME: CHAPTER 1 | ULTIMATE SIMULATION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nosifer&family=Share+Tech+Mono&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden;
            font-family: 'Share Tech Mono', monospace; cursor: none;
        }

        /* Korku Atmosferi & Noise */
        #screen {
            position: fixed; width: 100vw; height: 100vh;
            background: radial-gradient(circle at var(--x) var(--y), rgba(255,255,240,0.1) 0%, rgba(0,0,0,1) 300px);
            z-index: 10;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 5; }

        /* GrabPack Eller */
        .hand {
            position: fixed; bottom: -50px; width: 140px; height: 200px;
            border-radius: 30px 30px 10px 10px; border: 4px solid #fff;
            z-index: 100; transition: transform 0.05s ease-out;
            pointer-events: none;
        }

        #left-hand { left: 15%; background: #004aad; box-shadow: 0 0 50px #004aad; }
        #right-hand { right: 15%; background: #d6001c; box-shadow: 0 0 50px #d6001c; }

        /* HUD & VCR */
        .vcr-hud {
            position: fixed; top: 20px; left: 30px; color: #0f0;
            z-index: 1000; font-size: 1.2rem; text-transform: uppercase;
        }

        .glitch-text {
            font-family: 'Nosifer', cursive; color: #ff0033;
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 8rem; opacity: 0; z-index: 2000; pointer-events: none;
        }

        /* Kablo Efekti */
        #cable-canvas { z-index: 50; pointer-events: none; }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="screen"></div>
<div class="vcr-hud">
    <div>▶ PLAYING: SECTOR_4_ENTRY</div>
    <div id="clock">11:52:10</div>
    <div style="color: #ffde59;">GRABPACK_READY: TRUE</div>
</div>

<div id="glitch" class="glitch-text">RUN</div>

<canvas id="cable-canvas"></canvas>
<div id="left-hand" class="hand"></div>
<div id="right-hand" class="hand"></div>

<script>
    const screen = document.getElementById('screen');
    const leftHand = document.getElementById('left-hand');
    const rightHand = document.getElementById('right-hand');
    const canvas = document.getElementById('cable-canvas');
    const ctx = canvas.getContext('2d');
    const glitch = document.getElementById('glitch');

    let mouseX = 0, mouseY = 0;
    let lPos = { x: 0, y: 0, firing: false };
    let rPos = { x: 0, y: 0, firing: false };

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Mouse Hareketi
    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        screen.style.setProperty('--x', mouseX + 'px');
        screen.style.setProperty('--y', mouseY + 'px');
        
        // Elleri fareye doğru döndür
        if(!lPos.firing) leftHand.style.transform = `rotate(${(mouseX - window.innerWidth/4)/20}deg) translateY(${mouseY/50}px)`;
        if(!rPos.firing) rightHand.style.transform = `rotate(${(mouseX - window.innerWidth*0.75)/20}deg) translateY(${mouseY/50}px)`;
    });

    // Ateşleme Mekanizması
    document.addEventListener('mousedown', (e) => {
        if (e.button === 0) fireHand('left');
        else if (e.button === 2) fireHand('right');
    });

    function fireHand(side) {
        const sideObj = side === 'left' ? lPos : rPos;
        const element = side === 'left' ? leftHand : rightHand;
        
        if(sideObj.firing) return;
        
        sideObj.firing = true;
        sideObj.x = mouseX;
        sideObj.y = mouseY;

        element.style.transition = "all 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28)";
        element.style.left = (side === 'left' ? mouseX - 70 : mouseX - 70) + "px";
        element.style.top = mouseY + "px";
        element.style.width = "80px";
        element.style.height = "100px";

        setTimeout(() => {
            element.style.transition = "all 0.5s ease-in";
            element.style.left = side === 'left' ? "15%" : "unset";
            if(side === 'right') element.style.right = "15%";
            element.style.top = "unset";
            element.style.bottom = "-50px";
            element.style.width = "140px";
            element.style.height = "200px";
            setTimeout(() => { sideObj.firing = false; }, 500);
        }, 300);
    }

    // Kablo Çizimi (Canvas Loop)
    function drawCables() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 4;
        
        // Mavi Kablo
        ctx.beginPath();
        ctx.strokeStyle = '#002255';
        ctx.moveTo(window.innerWidth * 0.2, window.innerHeight);
        const lRect = leftHand.getBoundingClientRect();
        ctx.lineTo(lRect.left + 70, lRect.top + 100);
        ctx.stroke();

        // Kırmızı Kablo
        ctx.beginPath();
        ctx.strokeStyle = '#550011';
        ctx.moveTo(window.innerWidth * 0.8, window.innerHeight);
        const rRect = rightHand.getBoundingClientRect();
        ctx.lineTo(rRect.left + 70, rRect.top + 100);
        ctx.stroke();

        requestAnimationFrame(drawCables);
    }
    drawCables();

    // WASD Jumpscare
    let moveCounter = 0;
    document.addEventListener('keydown', (e) => {
        if(['w','a','s','d'].includes(e.key.toLowerCase())) {
            moveCounter++;
            document.body.classList.add('shake');
            if(moveCounter > 40 && Math.random() > 0.95) {
                glitch.style.opacity = "1";
                setTimeout(() => { glitch.style.opacity = "0"; }, 100);
                moveCounter = 0;
            }
        }
    });
    document.addEventListener('keyup', () => document.body.classList.remove('shake'));

    // Saat
    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = d.toLocaleTimeString();
    }, 1000);

</script>
</body>
</html>
